version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sales_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-salesdb}
      POSTGRES_USER: ${DB_USER:-salesuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sales_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-salesuser} -d ${DB_NAME:-salesdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sales_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - sales_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: sales_backend
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sales_net
      - proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # API routes
      - "traefik.http.routers.sales-api.rule=Host(`ql.thuanchay.vn`) && (PathPrefix(`/api`) || PathPrefix(`/webhooks`))"
      - "traefik.http.routers.sales-api.entrypoints=websecure"
      - "traefik.http.routers.sales-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.sales-api.loadbalancer.server.port=4000"
      # HTTP → HTTPS (handled by Traefik globally, but explicit here)
      - "traefik.http.routers.sales-api-http.rule=Host(`ql.thuanchay.vn`) && (PathPrefix(`/api`) || PathPrefix(`/webhooks`))"
      - "traefik.http.routers.sales-api-http.entrypoints=web"
      - "traefik.http.routers.sales-api-http.middlewares=redirect-https"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: sales_worker
    command: node src/worker.js
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sales_net
    restart: unless-stopped
    labels:
      - "traefik.enable=false"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: sales_frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    depends_on:
      - backend
    networks:
      - sales_net
      - proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # Frontend routes (catch-all for domain)
      - "traefik.http.routers.sales-frontend.rule=Host(`ql.thuanchay.vn`)"
      - "traefik.http.routers.sales-frontend.entrypoints=websecure"
      - "traefik.http.routers.sales-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.sales-frontend.priority=1"
      - "traefik.http.services.sales-frontend.loadbalancer.server.port=3000"
      # HTTP → HTTPS
      - "traefik.http.routers.sales-frontend-http.rule=Host(`ql.thuanchay.vn`)"
      - "traefik.http.routers.sales-frontend-http.entrypoints=web"
      - "traefik.http.routers.sales-frontend-http.middlewares=redirect-https"
      # Middleware redirect (shared)
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.permanent=true"

networks:
  sales_net:
    driver: bridge
  proxy:
    external: true   # Shared network với Traefik

volumes:
  postgres_data:
  redis_data:

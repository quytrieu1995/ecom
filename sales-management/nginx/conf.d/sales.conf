# HTTP → HTTPS redirect
server {
    listen 80;
    server_name ql.thuanchay.vn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ql.thuanchay.vn;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/ql.thuanchay.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ql.thuanchay.vn/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Upload limit (product images)
    client_max_body_size 20M;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css
               application/x-font-ttf image/svg+xml;

    # ─── Backend API ───────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ─── Webhook (separate block for monitoring) ───────────────────
    location /webhooks/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # No cache for webhooks
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        proxy_read_timeout 30s;
    }

    # ─── Next.js static assets (long-term cache) ───────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ─── Frontend Next.js ──────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ─── Access log per vhost ──────────────────────────────────────
    access_log /var/log/nginx/ql-thuanchay-access.log;
    error_log  /var/log/nginx/ql-thuanchay-error.log;
}
